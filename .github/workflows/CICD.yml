# This is the name of the workflow that will be displayed in the Actions tab
name: CICD

# Manual trigger
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "This is the environment value where this workflow runs"
        default: "dev"
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging

  push:
  #jb mera file change hoga tb he workflow chalega 
    paths:
      - "**.yml"
jobs:

  code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        run: echo "Code clone from GitHub"

  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build docker container
        run: echo "Docker container build"

  test:
    if: inputs.environment == 'prod'
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Test the container
        run: echo "Test the container"

  deploy:
    if: inputs.environment == 'dev'
    needs: [build,test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the app
        run: echo "Docker compose deploy the app"
