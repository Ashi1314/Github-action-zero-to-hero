name: Docker Build & Push

on:
  workflow_call:
  # push:
  #   branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ashish1012
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ashish1012/github-actions-app:${{ github.ref_name }}
            ashish1012/github-actions-app:latest
            ashish1012/github-actions-app:${{ github.sha }}
