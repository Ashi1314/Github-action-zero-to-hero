
name: Image Scanner

on:
  workflow_call:

jobs:
  image-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ashish1012
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ashish1012/github-actions-app:${{ github.sha }} # The name/tag of the image to scan
          severity: CRITICAL,HIGH   # Scans only for high and critical vulnerabilities
          exit-code: 1
          trivyignore: ${{ github.workspace }}/.trivyignore
